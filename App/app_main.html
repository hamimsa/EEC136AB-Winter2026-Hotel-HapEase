            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap'); 
            body { font-family: 'Inter', sans-serif; } 
            
            #top_sheet { height: 40vh; transition: height 0.5s cubic-bezier(0.32, 0.72, 0, 1); } 
            #drag_handle { touch-action: none; }
            #top_sheet.expanded_sheet { height: 85vh; } 
            
            .view_content { transition: opacity 0.4s ease; width: 100%; } 
            #collapsed_view { opacity: 1; pointer-events: auto; } 
            #top_sheet.expanded_sheet #collapsed_view { opacity: 0; pointer-events: none; } 
            
            #expanded_view { opacity: 0; pointer-events: none; position: absolute; top: 0; left: 0; padding-top: 2rem; } 
            #top_sheet.expanded_sheet #expanded_view { opacity: 1; pointer-events: auto; } 

            .expandable_card { height: 3rem; transition: height 0.4s cubic-bezier(0.32, 0.72, 0, 1); overflow: hidden; } 
            #top_sheet.expanded_sheet .expandable_card { height: 7rem; } 

            .fade_in_card { opacity: 0; transform: translateY(-10px); transition: opacity 0.4s ease, transform 0.4s ease; } 
            #top_sheet.expanded_sheet .fade_in_card { opacity: 1; transform: translateY(0); } 
            
            #health_summary { transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); transform: translateY(6vh); } 
            #top_sheet.expanded_sheet #health_summary { transform: translateY(34vh); } 
            
            @media (max-height: 650px) { .hide_on_short {  display: none !important; } } 
            
            .no_scrollbar::-webkit-scrollbar { display: none; }
            .no_scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
            
            .grab_cursor { cursor: grab; }
            .grab_cursor:active { cursor: grabbing; }
            
            .glass_panel { 
                background: rgba(28, 28, 30, 0.65); 
                border: 1px solid rgba(255, 255, 255, 0.08); 
                backdrop-filter: blur(12px); 
                -webkit-backdrop-filter: blur(12px); 
            } 
        </style>

        <script>
        const psoc_service_uuid = 'd8269034-c375-4459-acc0-a2f374d07c12'; 
        const spo2_char_uuid = 'f4dfa35b-a94b-4361-8380-f0f38e27ee89'; 
        const bpm_char_uuid = '16d73635-0663-460e-84f1-71cd57b679fc';
        const battery_char_uuid = '039dbf9e-ff82-4eda-84e1-ca6da8c4d94d';
        const position_char_uuid = '17f0ef18-238e-4281-8162-44623ae98abb';

        const graph_update_interval_ms = 1000; 

        const drag_handle = document.getElementById('drag_handle');
        const top_sheet = document.getElementById('top_sheet');
        const sheet_title = document.getElementById('sheet_title');
        let is_expanded = false;
        let start_y = 0;
        let is_ble_paired = false;
        let ble_device = null;
        
        let last_spo2_graph_update = 0;
        let last_bpm_graph_update = 0;
        let last_position_graph_update = 0;

        let current_spo2 = 98;
        let current_bpm = 72;
        let current_position = 0; 
        
        let apnea_events_count = 2; 
        let is_apnea_active = false; 
        
        let position_changes_count = 0;
        let last_known_position = null;

        function update_sleep_score() {
            let score = 100 - (apnea_events_count * 8) - (position_changes_count * 2);
            if (score < 0) score = 0;
            const score_el = document.getElementById('ui_sleep_score');
            const ring_el = document.getElementById('ui_score_ring');
            if (score_el) score_el.innerText = score;
            if (ring_el) {
                const offset = 251.2 - (251.2 * (score / 100));
                ring_el.style.strokeDashoffset = offset;
            }
        }

        document.getElementById('btn_reset_session').addEventListener('click', () => {
            apnea_events_count = 0;
            position_changes_count = 0;
            is_apnea_active = false;
            last_known_position = null;
            
            const apnea_el = document.getElementById('ui_apnea_events');
            if (apnea_el) apnea_el.innerText = apnea_events_count;
            
            const changes_el = document.getElementById('ui_position_changes');
            if (changes_el) changes_el.innerText = position_changes_count;
            
            update_sleep_score();
            
            swipe_container.scrollTo({ left: 0, behavior: 'smooth' });
        });

        function evaluate_health() {
            const dot = document.getElementById('health_dot');
            const text = document.getElementById('health_text');
            if (!dot || !text) return;
            if (current_spo2 > 0 && current_spo2 < 90) {
                dot.className = "w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse";
                text.innerText = "Low Blood Oxygen";
                text.className = "text-red-700 font-bold text-sm";
            } else if (current_bpm > 100) {
                dot.className = "w-2.5 h-2.5 rounded-full bg-yellow-500";
                text.innerText = "Elevated Heart Rate";
                text.className = "text-yellow-700 font-bold text-sm";
            } else if (current_bpm > 0 && current_bpm < 50) {
                dot.className = "w-2.5 h-2.5 rounded-full bg-yellow-500";
                text.innerText = "Low Heart Rate";
                text.className = "text-yellow-700 font-bold text-sm";
            } else {
                dot.className = "w-2.5 h-2.5 rounded-full bg-[#279595]";
                text.innerText = "Vitals Normal";
                text.className = "text-[#2a3a4c] font-semibold text-sm";
            }
        }

        function evaluate_apnea_events() {
            let currently_triggered = (current_spo2 > 0 && current_spo2 < 90) || (current_position === 0);
            
            if (currently_triggered && !is_apnea_active) {
                apnea_events_count++;
                const apnea_el = document.getElementById('ui_apnea_events');
                if (apnea_el) apnea_el.innerText = apnea_events_count;
                is_apnea_active = true;
                update_sleep_score();
            } else if (!currently_triggered && is_apnea_active) {
                is_apnea_active = false;
            }
        }

        function toggle_sheet(force_expand = null) {
            if (force_expand !== null) {
                is_expanded = force_expand;
            } else {
                is_expanded = !is_expanded;
            }
            top_sheet.classList.toggle('expanded_sheet', is_expanded);
        }

        drag_handle.addEventListener('click', () => toggle_sheet());
        drag_handle.addEventListener('mousedown', (e) => { start_y = e.clientY; e.preventDefault(); });
        document.addEventListener('mouseup', (e) => {
            if (start_y === 0) return;
            let delta_y = e.clientY - start_y;
            if (!is_expanded && delta_y > 40) toggle_sheet(true);  
            if (is_expanded && delta_y < -40) toggle_sheet(false); 
            start_y = 0;
        });

        drag_handle.addEventListener('touchstart', (e) => { start_y = e.touches[0].clientY; }, {passive: true});
        document.addEventListener('touchend', (e) => {
            if (start_y === 0) return;
            let delta_y = e.changedTouches[0].clientY - start_y;
            if (!is_expanded && delta_y > 40) toggle_sheet(true);  
            if (is_expanded && delta_y < -40) toggle_sheet(false); 
            start_y = 0;
        });

        const swipe_container = document.getElementById('swipe_container');
        const dot_1 = document.getElementById('dot_1');
        const dot_2 = document.getElementById('dot_2');

        swipe_container.addEventListener('scroll', () => {
            if (swipe_container.scrollLeft > swipe_container.clientWidth / 2) {
                dot_1.classList.replace('bg-[#279595]', 'bg-[#8b9ba8]');
                dot_2.classList.replace('bg-[#8b9ba8]', 'bg-[#279595]');
                sheet_title.innerText = "Settings";
            } else {
                dot_1.classList.replace('bg-[#8b9ba8]', 'bg-[#279595]');
                dot_2.classList.replace('bg-[#279595]', 'bg-[#8b9ba8]');
                sheet_title.innerText = "HapEase";
            }
        });

        let is_down = false;
        let start_x;
        let scroll_left;

        swipe_container.addEventListener('mousedown', (e) => {
            is_down = true;
            start_x = e.pageX - swipe_container.offsetLeft;
            scroll_left = swipe_container.scrollLeft;
        });

        swipe_container.addEventListener('mouseleave', () => {
            is_down = false;
        });

        swipe_container.addEventListener('mouseup', () => {
            is_down = false;
        });

        swipe_container.addEventListener('mousemove', (e) => {
            if (!is_down) return;
            e.preventDefault();
            const x = e.pageX - swipe_container.offsetLeft;
            const walk = (x - start_x) * 2; 
            swipe_container.scrollLeft = scroll_left - walk;
        });

        async function connect_bluetooth() {
            if (!navigator.bluetooth) {
                alert("Web Bluetooth API is not available.");
                return;
            }

            if (is_ble_paired && ble_device && ble_device.gatt.connected) {
                ble_device.gatt.disconnect();
                return; 
            }

            document.getElementById('ble_pill_text').innerText = "Connecting...";
            document.getElementById('ble_card_text').innerText = "Connecting...";

            try {
                ble_device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [psoc_service_uuid] 
                });
                
                ble_device.addEventListener('gattserverdisconnected', on_disconnected);

                const server = await ble_device.gatt.connect();
                const service = await server.getPrimaryService(psoc_service_uuid);
                
                const spo2_char = await service.getCharacteristic(spo2_char_uuid);
                await spo2_char.startNotifications();
                spo2_char.addEventListener('characteristicvaluechanged', (e) => handle_sensor_update(e, 'spo2'));

                const bpm_char = await service.getCharacteristic(bpm_char_uuid);
                await bpm_char.startNotifications();
                bpm_char.addEventListener('characteristicvaluechanged', (e) => handle_sensor_update(e, 'bpm'));

                const battery_char = await service.getCharacteristic(battery_char_uuid);
                await battery_char.startNotifications();
                battery_char.addEventListener('characteristicvaluechanged', (e) => handle_sensor_update(e, 'battery'));

                const position_char = await service.getCharacteristic(position_char_uuid);
                await position_char.startNotifications();
                position_char.addEventListener('characteristicvaluechanged', (e) => handle_sensor_update(e, 'position'));

                is_ble_paired = true;
                update_ble_ui();

            } catch (error) {
                update_ble_ui();
            }
        }

        function on_disconnected() {
            is_ble_paired = false;
            update_ble_ui();
        }

        function handle_sensor_update(event, type) {
            const data_val = event.target.value.getUint8(0); 
            const now = Date.now();

            if (type === 'spo2') {
                const ui_text = document.getElementById('ui_bloodoxygen');
                ui_text.innerText = data_val;
                current_spo2 = data_val;
                
                if (data_val < 90 && data_val > 0) {
                    ui_text.classList.add('text-red-500');
                    ui_text.classList.remove('text-white');
                } else {
                    ui_text.classList.add('text-white');
                    ui_text.classList.remove('text-red-500');
                }
                
                if (now - last_spo2_graph_update >= graph_update_interval_ms) {
                    update_graph(spo2_history, data_val, 'spo2');
                    last_spo2_graph_update = now;
                }

            } else if (type === 'bpm') {
                document.getElementById('ui_heartbeat').innerText = data_val;
                current_bpm = data_val;
                
                if (now - last_bpm_graph_update >= graph_update_interval_ms) {
                    update_graph(bpm_history, data_val, 'bpm');
                    last_bpm_graph_update = now;
                }

            } else if (type === 'battery') {
                document.getElementById('ui_battery_pill').innerText = data_val + '%';
                document.getElementById('ui_battery_card').innerText = data_val;

           } else if (type === 'position') {
                current_position = data_val;
                const position_map = {
                    0: 'Back',
                    1: 'Front',
                    2: 'Right',
                    3: 'Left'
                };
                const position_text = position_map[data_val] || `Unknown`;
                const pos_el = document.getElementById('ui_position_main');
                const pos_card_el = document.getElementById('ui_position_card');
                if (pos_el) pos_el.innerText = position_text;
                if (pos_card_el) pos_card_el.innerText = position_text;
                
                if (last_known_position !== null && current_position !== last_known_position) {
                    position_changes_count++;
                    const changes_el = document.getElementById('ui_position_changes');
                    if (changes_el) changes_el.innerText = position_changes_count;
                    update_sleep_score();
                }
                last_known_position = current_position;

                if (now - last_position_graph_update >= graph_update_interval_ms) {
                    update_graph(position_history, data_val, 'position');
                    last_position_graph_update = now;
                }
            }
            
            evaluate_health();
            evaluate_apnea_events();
        }

        function update_ble_ui() {
            const pill = document.getElementById('ble_pill');
            const pill_text = document.getElementById('ble_pill_text');
            
            const card = document.getElementById('ble_card');
            const card_text = document.getElementById('ble_card_text');
            const card_title = document.getElementById('ble_card_title');

            const pill_path = document.getElementById('ble_pill_icon').querySelector('path');
            const card_path = document.getElementById('ble_card_icon').querySelector('path');

            const paired_path = "M440-80v-304L256-200l-56-56 224-224-224-224 56-56 184 184v-304h40l228 228-172 172 172 172L480-80h-40Zm80-496 76-76-76-74v150Zm0 342 76-74-76-76v150ZM157.5-437.5Q140-455 140-480t17.5-42.5Q175-540 200-540t42.5 17.5Q260-505 260-480t-17.5 42.5Q225-420 200-420t-42.5-17.5Zm560 0Q700-455 700-480t17.5-42.5Q735-540 760-540t42.5 17.5Q820-505 820-480t-17.5 42.5Q785-420 760-420t-42.5-17.5Z";
            const unpaired_path = "M792-56 624-224 480-80h-40v-304L256-200l-56-56 196-196L56-792l56-56 736 736-56 56ZM520-234l46-46-46-46v92Zm44-274-56-56 88-88-76-74v174l-80-80v-248h40l228 228-144 144Z";

            if (is_ble_paired) {
                pill_path.setAttribute('d', paired_path);
                card_path.setAttribute('d', paired_path);

                pill.className = "bg-[#bac6d3] border border-[#aab7c6] flex flex-1 h-12 items-center justify-center gap-2 rounded-full shadow-sm text-[#1d2635] cursor-pointer hover:bg-[#aab8c9] transition-colors duration-300";
                document.getElementById('ble_pill_icon').setAttribute('class', "w-7 h-7 text-[#279595] fill-current");
                document.getElementById('ble_card_icon').setAttribute('class', "w-8 h-8 text-[#279595] fill-current");
                pill_text.innerText = "Connected";
                
                card.className = "expandable_card bg-[#bac6d3] border border-[#aab7c6] rounded-2xl p-6 shadow-sm flex flex-col justify-center cursor-pointer hover:bg-[#aab8c9] transition-colors duration-300";
                card_title.className = "text-[#2a3a4c] font-semibold text-sm mb-2";
                card_text.innerText = "Connected";
                card_text.className = "text-[#2a3a4c] text-2xl font-bold leading-none tracking-tight flex items-baseline";

            } else {
                pill_path.setAttribute('d', unpaired_path);
                card_path.setAttribute('d', unpaired_path);

                pill.className = "bg-red-100 border border-red-300 flex flex-1 h-12 items-center justify-center gap-2 rounded-full shadow-sm text-red-700 cursor-pointer hover:bg-red-200 transition-colors duration-300";
                document.getElementById('ble_pill_icon').setAttribute('class', "w-7 h-7 text-red-600 fill-current");
                document.getElementById('ble_card_icon').setAttribute('class', "w-8 h-8 text-red-600 fill-current");
                pill_text.innerText = "Disconnected";
                
                card.className = "expandable_card bg-red-100 border border-red-300 rounded-2xl p-6 shadow-sm flex flex-col justify-center cursor-pointer hover:bg-red-200 transition-colors duration-300";
                card_title.className = "text-red-800 font-semibold text-sm mb-2";
                card_text.innerText = "Disconnected";
                card_text.className = "text-red-700 text-2xl font-bold leading-none tracking-tight flex items-baseline";
            }
        }

        document.getElementById('ble_pill').addEventListener('click', connect_bluetooth);
        document.getElementById('ble_card').addEventListener('click', connect_bluetooth);

        const max_points = 15;
        let spo2_history = [97, 98, 98, 99, 98, 97, 98, 99, 98, 98, 97, 98, 99, 98, 98]; 
        let bpm_history  = [72, 73, 71, 72, 74, 75, 73, 72, 71, 72, 73, 72, 71, 72, 72];
        let position_history = [0, 0, 0, 3, 3, 3, 1, 1, 2, 2, 0, 0, 0, 0, 0];
        let time_labels = Array(max_points).fill(''); 
        let current_graph_mode = 'spo2'; 

        const ctx = document.getElementById('activity_chart').getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(0, 212, 182, 0.4)');
        gradient.addColorStop(1, 'rgba(0, 212, 182, 0.0)');

        let activity_chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: time_labels,
                datasets: [{
                    data: spo2_history, 
                    borderColor: '#00d4b6',
                    backgroundColor: gradient,
                    borderWidth: 2,
                    tension: 0.4,
                    fill: 'start',
                    pointBackgroundColor: '#ffffff',
                    pointBorderColor: '#00d4b6',
                    pointBorderWidth: 2,
                    pointHoverRadius: 6,
                    stepped: false,
                    pointRadius: (context) => {
                        const data = context.dataset.data;
                        if (!data || data.length === 0 || current_graph_mode === 'position') return 0;
                        const max_val = Math.max(...data);
                        return data[context.dataIndex] === max_val ? 5 : 0;
                    }
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                animation: { duration: 300 }, 
                scales: {
                    x: { 
                        display: true, 
                        grid: { color: 'rgba(255,255,255,0.05)', borderDash: [4, 4] },
                        ticks: { display: false }
                    },
                    y: { 
                        display: true, 
                        grid: { color: 'rgba(255,255,255,0.05)', borderDash: [4, 4] },
                        ticks: { 
                            color: '#777', 
                            font: { size: 9 },
                            callback: function(value) {
                                if (current_graph_mode === 'position') {
                                    const labels = ['Back', 'Front', 'Right', 'Left'];
                                    return labels[value] || '';
                                }
                                return value;
                            }
                        },
                        min: 0, 
                        suggestedMax: 100
                    }
                }
            }
        });

        function update_graph(history_array, new_value, type) {
            history_array.push(new_value);
            history_array.shift(); 
            
            if (current_graph_mode === type) {
                if (type === 'bpm') {
                    activity_chart.options.scales.y.suggestedMax = Math.max(...bpm_history) + 5;
                }
                activity_chart.update();
            }
        }

        const btn_spo2 = document.getElementById('btn_spo2');
        const btn_bpm = document.getElementById('btn_bpm');
        const btn_position = document.getElementById('btn_position');
        
        const active_class = "bg-[#2c2c2e] text-gray-200 border border-[#3a3a3c] px-5 py-2 rounded-full text-sm font-medium shadow-sm";
        const inactive_class = "bg-transparent border border-[#3a3a3c] text-gray-400 px-5 py-2 rounded-full text-sm font-medium hover:bg-[#2c2c2e] transition";

        function switch_graph_mode(mode) {
            current_graph_mode = mode;
            
            btn_spo2.className = inactive_class;
            btn_bpm.className = inactive_class;
            btn_position.className = inactive_class;

            if (mode === 'spo2') {
                btn_spo2.className = active_class;
                activity_chart.data.datasets[0].data = spo2_history;
                activity_chart.data.datasets[0].stepped = false;
                activity_chart.data.datasets[0].fill = 'start';
                activity_chart.options.scales.y.min = 0; 
                delete activity_chart.options.scales.y.max;
                activity_chart.options.scales.y.suggestedMax = 100;
                delete activity_chart.options.scales.y.ticks.stepSize;
            } else if (mode === 'bpm') {
                btn_bpm.className = active_class;
                activity_chart.data.datasets[0].data = bpm_history;
                activity_chart.data.datasets[0].stepped = false;
                activity_chart.data.datasets[0].fill = 'start';
                activity_chart.options.scales.y.min = 0;
                delete activity_chart.options.scales.y.max;
                activity_chart.options.scales.y.suggestedMax = Math.max(...bpm_history) + 5;
                delete activity_chart.options.scales.y.ticks.stepSize;
            } else if (mode === 'position') {
                btn_position.className = active_class;
                activity_chart.data.datasets[0].data = position_history;
                activity_chart.data.datasets[0].stepped = true;
                activity_chart.data.datasets[0].fill = false; 
                activity_chart.options.scales.y.min = 0;
                activity_chart.options.scales.y.max = 3;
                delete activity_chart.options.scales.y.suggestedMax;
                activity_chart.options.scales.y.ticks.stepSize = 1; 
            }
            activity_chart.update();
        }

        btn_spo2.addEventListener('click', () => switch_graph_mode('spo2'));
        btn_bpm.addEventListener('click', () => switch_graph_mode('bpm'));
        btn_position.addEventListener('click', () => switch_graph_mode('position'));
        
        update_sleep_score();
        evaluate_health();
        </script>         
    </body>     
</html>
